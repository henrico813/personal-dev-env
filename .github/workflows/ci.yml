name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: planner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: planner/go.mod
          cache-dependency-path: planner/go.sum
      - name: install golangci-lint
        run: make init
      - name: check
        run: make check
