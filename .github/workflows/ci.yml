name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: planner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: planner/go.mod
          cache-dependency-path: planner/go.sum
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4
          working-directory: planner
      - name: test
        run: go test ./...
