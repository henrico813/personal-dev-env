# DEPRECATED: Use site.yml instead
# This file is maintained for backwards compatibility only.
# REMOVAL DATE: After 2026-06-01 or v2.0 release (whichever comes first)
#
# Migration:
#   Old: ansible-playbook main.yml -e "user=myuser"
#   New: ansible-playbook site.yml --ask-become-pass
#
- name: "System Configuration"
  hosts: localhost
  become: yes

  vars_files:
    - vars/versions.yml

  vars:
    target_user: "{{ user }}"
    user_home: "/home/{{ user }}"
    app_data_dir: "{{ user_home }}/.local/share/"
    fonts_dir: "{{ app_data_dir }}/fonts"
    node_version: "{{ node_version | default('18') }}"

    # Font URLs - uses nerd_fonts_version from vars/versions.yml
    font_downloads:
      - name: "FiraCode"
        url: "https://github.com/ryanoasis/nerd-fonts/releases/download/{{ nerd_fonts_version }}/FiraCode.zip"
        archive_type: "zip"
      - name: "UbuntuMono"
        url: "https://github.com/ryanoasis/nerd-fonts/releases/download/{{ nerd_fonts_version }}/UbuntuMono.zip"
        archive_type: "zip"
      - name: "JetBrainsMono"
        url: "https://github.com/ryanoasis/nerd-fonts/releases/download/{{ nerd_fonts_version }}/JetBrainsMono.tar.xz"
        archive_type: "tar.xz"

    # Shell Configuration Files
    shell_cfgs:
      - src: "config/zsh/.zsh_plugins.txt"
        dest: "{{ user_home }}/.zsh_plugins.txt"
      - src: "config/zsh/.zshrc"
        dest: "{{ user_home }}/.zshrc"
      - src: "config/tmux/.tmux.conf"
        dest: "{{ user_home }}/.tmux.conf"
      - src: "config/powerlevel10k/.p10k.zsh"
        dest: "{{ user_home }}/.p10k.zsh"

    # User Configuration files
    tool_cfgs:
      - src: "config/aider/.aider.conf.yml"
        dest: "{{ user_home }}/.aider.conf.yml"
      - src: "../ai-profiles/codex/config.toml"
        dest: "{{ user_home }}/.codex/config.toml"

  tasks:
    # ============================================
    # INIT SYSTEM CONFIGURATION
    # ============================================

    - name: Install dependencies
      tags: ["deps"]
      include_tasks: tasks/install_deps_legacy.yml

    - name: "Configure system locale"
      locale_gen:
        name: "en_US.UTF-8"
        state: present
      tags: ["init", "locale"]

    - name: "Set system timezone"
      timezone:
        name: "America/Los_Angeles"
      tags: ["init", "timezone"]

    - name: "Create user account"
      user:
        name: "{{ target_user }}"
        shell: "/bin/zsh"
        create_home: yes
      tags: ["init", "user"]

    - name: "Grant sudo privileges (guarded - not recommended)"
      lineinfile:
        path: "/etc/sudoers"
        state: present
        line: "{{ target_user }} ALL=(ALL) NOPASSWD:ALL"
        validate: "/usr/sbin/visudo -cf %s"
      when: grant_passwordless_sudo | default(false)
      tags: ["init", "sudo"]

    # ============================================
    # MAIN INSTALLATIONS
    # ============================================

    # Font installation
    - name: Setup fonts
      tags: ["fonts"]
      include_tasks: tasks/install_fonts.yml

    # Shell configuration
    - name: Setup zsh and tmux environment
      tags: ["shell"]
      import_tasks: tasks/install_shell_legacy.yml

    # Development tools
    - name: Install tools
      tags: ["tools"]
      import_tasks: tasks/install_tools_legacy.yml

    # ============================================
    # PDE CONFIGURATION
    # ============================================

    - name: Create PDE config directory
      file:
        path: "{{ user_home }}/.config/pde"
        state: directory
        mode: '0755'
      become: yes
      become_user: "{{ user }}"
      tags: ["config"]

    - name: Write PDE install path configuration
      copy:
        content: |
          # Personal Dev Environment configuration
          # This file is auto-generated by Ansible
          # You can manually edit this if the PDE repository moves
          export PDE_INSTALL_PATH="{{ playbook_dir | dirname }}"
        dest: "{{ user_home }}/.config/pde/paths.env"
        mode: '0644'
      become: yes
      become_user: "{{ user }}"
      tags: ["config"]
