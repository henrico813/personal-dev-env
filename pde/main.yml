- name: "System Configuration"
  hosts: localhost
  become: yes
  vars:
    target_user: "{{ user }}"
    user_home: "/home/{{ user }}"
    app_data_dir: "{{ user_home }}/.local/share/"
    fonts_dir: "{{ app_data_dir }}/fonts"
    node_version: "{{ node_version | default('18') }}"

    # Font URLs - centralized for easier maintenance
    font_downloads:
      - name: "FiraCode"
        url: "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.2.1/FiraCode.zip"
        archive_type: "zip"
      - name: "UbuntuMono"
        url: "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/UbuntuMono.zip"
        archive_type: "zip"
      - name: "JetBrainsMono"
        url: "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.tar.xz"
        archive_type: "tar.xz"

    # Shell Configuration Files
    shell_cfgs:
      - src: "config/zsh/.zsh_plugins.txt"
        dest: "{{ user_home }}/.zsh_plugins.txt"
      - src: "config/zsh/.zshrc"
        dest: "{{ user_home }}/.zshrc"
      - src: "config/tmux/.tmux.conf"
        dest: "{{ user_home }}/.tmux.conf"
      - src: "config/powerlevel10k/.p10k.zsh"
        dest: "{{ user_home }}/.p10k.zsh"

    # User Configuration files
    tool_cfgs:
      - src: "config/aider/.aider.conf.yml"
        dest: "{{ user_home }}/.aider.conf.yml"

  tasks:
    # ============================================
    # INIT SYSTEM CONFIGURATION
    # ============================================

    - name: Install dependencies
      tags: ["deps"]
      include_tasks: tasks/install_deps.yml

    - name: "Configure system locale"
      locale_gen:
        name: "en_US.UTF-8"
        state: present
      tags: ["init", "locale"]

    - name: "Set system timezone"
      timezone:
        name: "America/Los_Angeles"
      tags: ["init", "timezone"]

    - name: "Create user account"
      user:
        name: "{{ target_user }}"
        shell: "/bin/zsh"
        create_home: yes
      tags: ["init", "user"]

    - name: "Grant sudo privileges to user"
      lineinfile:
        path: "/etc/sudoers"
        state: present
        line: "{{ target_user }} ALL=(ALL) NOPASSWD:ALL"
        validate: "/usr/sbin/visudo -cf %s"
      tags: ["init", "sudo"]

    # ============================================
    # MAIN INSTALLATIONS
    # ============================================

    # Font installation
    - name: Setup fonts
      tags: ["fonts"]
      include_tasks: tasks/install_fonts.yml

    # Shell configuration
    - name: Setup zsh and tmux environment
      tags: ["shell"]
      import_tasks: tasks/install_shell.yml

    # Development tools
    - name: Install tools
      tags: ["tools"]
      import_tasks: tasks/install_tools.yml
