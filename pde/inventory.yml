---
# Ansible inventory for personal-dev-env deployments
# Usage: ansible-playbook -i pde/inventory.yml pde/site.yml

all:
  vars:
    # Common variables for all hosts
    ansible_connection: ssh
    ansible_user: "{{ lookup('env', 'USER') }}"

  children:
    # Development machines - full installation
    development:
      hosts:
        localhost:
          ansible_connection: local
        # devlab:
        #   ansible_host: devlab.local

      vars:
        # Development profile - install everything
        pde_profile: development
        install_fonts: true
        install_dev_tools: true
        install_shell: true
        install_ai_tools: true

    # Server machines - shell QoL only
    servers:
      hosts:
        # pve1:
        #   ansible_host: pve1.local
        # pve2:
        #   ansible_host: pve2.local
        # blathers:
        #   ansible_host: blathers.local

      vars:
        # Server profile - minimal installation
        pde_profile: server
        install_fonts: false
        install_dev_tools: false
        install_shell: true
        install_ai_tools: false
        # Lighter shell tools for servers
        skip_heavy_tools: true

    # Minimal profile - absolute essentials
    minimal:
      hosts:
        # Add hosts that need only basic shell setup

      vars:
        pde_profile: minimal
        install_fonts: false
        install_dev_tools: false
        install_shell: true
        install_ai_tools: false
        skip_heavy_tools: true
        # Even lighter - skip things like yazi
        minimal_shell: true
