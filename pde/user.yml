---
# User-level configuration - no sudo needed
# Run with: ansible-playbook user.yml
- name: User-level setup
  hosts: all
  become: no

  vars_files:
    - defaults.yml
    - vars/versions.yml

  vars:
    user_home: "{{ ansible_env.HOME }}"
    app_data_dir: "{{ user_home }}/.local/share"
    fonts_dir: "{{ app_data_dir }}/fonts"

  pre_tasks:
    - name: Verify system prerequisites are installed
      command: which {{ item }}
      register: prereq_check
      failed_when: false
      changed_when: false
      loop:
        - git
        - zsh
        - curl
        - unzip
      tags: [always]

    - name: Warn if system prerequisites missing
      debug:
        msg: "WARNING: {{ item.item }} not found. Run system.yml first for full functionality."
      when: item.rc != 0
      loop: "{{ prereq_check.results }}"
      loop_control:
        label: "{{ item.item }}"
      tags: [always]

  tasks:
    # Rust installation
    - include_tasks: tasks/install_rust.yml
      tags: [user, rust]

    # Shell environment (antidote, p10k, tpm, eza)
    - include_tasks: tasks/install_shell_user.yml
      when: install_shell | default(true)
      tags: [user, shell]

    # Fonts (always installed - required for terminal/editor icons)
    - include_tasks: tasks/install_fonts.yml
      tags: [user, fonts]

    # Development tools (nvm, node, yazi, AI tools)
    - include_tasks: tasks/install_tools_user.yml
      when: install_dev_tools | default(false) or install_ai_tools | default(false)
      tags: [user, tools]

    # Copy config files
    - include_tasks: tasks/install_configs.yml
      tags: [user, config]

    # Write PDE metadata
    - name: Create PDE config directory
      file:
        path: "{{ user_home }}/.config/pde"
        state: directory
        mode: '0755'
      tags: [user, config]

    - name: Write PDE configuration
      copy:
        content: |
          # Personal Dev Environment configuration
          # Auto-generated by Ansible
          export PDE_INSTALL_PATH="{{ playbook_dir | dirname }}"
          export PDE_PROFILE="{{ pde_profile | default('development') }}"
        dest: "{{ user_home }}/.config/pde/paths.env"
        mode: '0644'
      tags: [user, config]
