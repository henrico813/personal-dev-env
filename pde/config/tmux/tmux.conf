# Terminal colors - required for prompt and editor colors to match outside tmux
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Change prefix from 'Ctrl+B' to 'Ctrl+A'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Accidentally pressing space closes windows and I don't like that.
unbind Space

set-option -g status-position top

# Status bar styling - Tokyo Night rounded powerline hybrid
set -g status-style bg=#1a1b26
set -g status-left-length 30
set -g status-right-length 50
set -g status-left "#[fg=#7aa2f7]#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#7aa2f7] "
set -g window-status-separator ""
set -g window-status-format         "#[fg=#565f89] #I:#W "
set -g window-status-current-format "#[fg=#414868]#[bg=#414868,fg=#c0caf5,bold] #I:#W #[bg=#1a1b26,fg=#414868]"
set -g status-right "#[fg=#bb9af7]#[bg=#bb9af7,fg=#1a1b26] %d %b #[bg=#1a1b26,fg=#bb9af7]#[fg=#7aa2f7]#[bg=#7aa2f7,fg=#1a1b26] %H:%M #[bg=#1a1b26,fg=#7aa2f7]"

# Open new panes in the current window's directory.
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
bind c   new-window      -c "#{pane_current_path}"

# Pane navigation (vim keys)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane borders
set -g pane-border-lines heavy
set -g pane-border-style fg=#414868
set -g pane-active-border-style fg=#7aa2f7

# Preserve last-window — moved off prefix-l
bind Tab last-window

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Pane number display colors
set -g display-panes-colour "#414868"
set -g display-panes-active-colour "#7aa2f7"
set -g display-panes-time 2000

# Make copy pasting easier by enabling vim keybindings for scroll mode.
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
# These commands only work on Linux and ally copy pasting in scroll mode.
set -s copy-command 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
# Enable mouse activation of scroll mode.
set -g mouse on

# Image passthrough for Yazi image preview.
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Restore vim and neovim sessions, plus pane contents, across tmux restarts.
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'ssh vim nvim'
set -g @resurrect-capture-pane-contents 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
