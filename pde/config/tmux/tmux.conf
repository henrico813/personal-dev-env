# Terminal colors - required for prompt and editor colors to match outside tmux
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Change prefix from 'Ctrl+B' to 'Ctrl+A'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Accidentally pressing space closes windows and I don't like that.
unbind Space

set-option -g status-position top

# Status bar styling - Everforest Dark Hard rounded powerline hybrid
set -g status-style bg=#2b3339
set -g status-left-length 30
set -g status-right-length 50
set -g status-left "#[fg=#a7c080]#[bg=#a7c080,fg=#2b3339,bold] #S #[bg=#2b3339,fg=#a7c080] "
set -g window-status-separator ""
set -g window-status-format         "#[fg=#859289] #I:#W "
set -g window-status-current-format "#[fg=#3c4741]#[bg=#3c4741,fg=#d3c6aa,bold] #I:#W #[bg=#2b3339,fg=#3c4741]"
set -g status-right "#[fg=#d699b6]#[bg=#d699b6,fg=#2b3339] %d %b #[bg=#2b3339,fg=#d699b6]#[fg=#a7c080]#[bg=#a7c080,fg=#2b3339] %H:%M #[bg=#2b3339,fg=#a7c080]"

# Open new panes in the current window's directory.
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
bind c   new-window      -c "#{pane_current_path}"

# Pane navigation (vim keys)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane borders
set -g pane-border-lines heavy
set -g pane-border-style fg=#3c4741
set -g pane-active-border-style fg=#a7c080

# Preserve last-window — moved off prefix-l
bind Tab last-window

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Pane number display colors
set -g display-panes-colour "#3c4741"
set -g display-panes-active-colour "#a7c080"
set -g display-panes-time 2000

# Make copy pasting easier by enabling vim keybindings for scroll mode.
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
# These commands only work on Linux and ally copy pasting in scroll mode.
set -s copy-command 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
# Enable mouse activation of scroll mode.
set -g mouse on

# Image passthrough for Yazi image preview.
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Restore vim and neovim sessions, plus pane contents, across tmux restarts.
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'ssh vim nvim'
set -g @resurrect-capture-pane-contents 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
