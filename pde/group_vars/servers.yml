---
# Server profile - shell QoL only
# Applied to hosts in 'servers' inventory group

pde_profile: server

# Feature flags
install_fonts: false
install_dev_tools: false
install_shell: true
install_ai_tools: false

# Shell tools - core essentials only
# Lighter than development, skip heavy tools
# Note: zsh is always installed by system.yml
# Note: tmux is built from source by system.yml for modern features
shell_tools:
  - fd-find
  - fzf
  - ripgrep
  - bat
  - jq

# Skip these for servers
# - trash-cli (not needed on servers)
# - zoxide (nice-to-have, but optional)

# Development tools - none for servers
dev_tools: []

# Disable optional heavy features
install_yazi: false       # File manager not needed on servers
install_neovim: true      # Keep vim for editing
install_lazyvim: false    # Skip LazyVim plugins on servers

# No AI tools on servers
ai_tools: []

# Skip Node.js/npm on servers (no need for codex/claude)
skip_node: true
