---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install necessary packages
  apt:
    name:
      - curl
      - tar
      - xz-utils
      - sudo
      - screen
      - locales
      - locales-all
      - fontconfig
      - fonts-dejavu-core
      - fonts-dejavu-extra
      - fonts-liberation
      - ttf-mscorefonts-installer
      - fonts-powerline
      - unzip
    state: latest

- name: Install development dependencies
  apt:
    name:
      - git
      - python3
    state: latest

- name: Check if Rust is already installed
  stat:
    path: "{{ user_home }}/.cargo/bin/rustc"
  register: rust_installed

- name: Install Rust
  become: yes
  become_user: "{{ user }}"
  block:
  - name: Install if Rust is missing
    block:

    - name: Download rustup installer
      get_url:
        url: https://sh.rustup.rs
        dest: /tmp/rustup-init.sh
        mode: '0755'
    - name: Install Rust via rustup
      shell: /tmp/rustup-init.sh -y
      environment:
        CARGO_HOME: "{{ user_home }}/.cargo"
        RUSTUP_HOME: "{{ user_home }}/.rustup"

    when: not rust_installed.stat.exists

  - name: Update Rust if already installed
    shell: "{{ user_home }}/.cargo/bin/rustup update"
    when: rust_installed.stat.exists
    ignore_errors: yes

