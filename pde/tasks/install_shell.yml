- name: Install necessary packages
  apt:
    name:
      - zsh
      - tmux
    state: present

- name: Check if antidote is already installed
  become: yes
  become_user: "{{ user }}"
  stat:
    path: "{{ user_home }}/.config/config/antidote"
  register: antidote_check

- name: Install antidote
  become: yes
  become_user: "{{ user }}"
  git:
    repo: https://github.com/mattmc3/antidote.git
    dest: "{{ user_home }}/.config/config/antidote"
    depth: 1
    clone: yes
    update: no
  when: not antidote_check.stat.exists

- name: Change default shell to zsh for specific user
  user:
    name: "{{ target_user }}"
    shell: /bin/zsh
  become: yes
  become_user: "{{ user }}"

- name: Copy shell config files
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode | default(omit) }}"
  loop: "{{ shell_cfgs }}"
  become: yes
  become_user: "{{ user }}"

- name: Install the powerlevel10k zsh theme.
  become: yes
  become_user: "{{ user }}"
  shell: >
    git clone --depth=1 https://github.com/romkatv/powerlevel10k.git ~/.config/powerlevel10k

- name: Configure tmux plugins and settings
  become: yes
  become_user: "{{ user }}"
  shell: >
    git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
