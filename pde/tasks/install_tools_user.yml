---
# Development tools - user level
# No sudo needed

# NVM and Node.js
- name: Install nvm
  shell: |
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh | bash
  args:
    creates: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
  environment:
    NVM_DIR: "{{ ansible_env.HOME }}/.nvm"
  when: not (skip_node | default(false))

- name: Check if Node.js is installed via nvm
  shell: |
    source {{ ansible_env.HOME }}/.nvm/nvm.sh
    nvm ls {{ node_version }} 2>/dev/null | grep -q "v{{ node_version }}"
  args:
    executable: /bin/bash
  register: node_check
  ignore_errors: yes
  changed_when: false
  when: not (skip_node | default(false))

- name: Install Node.js via nvm
  shell: |
    source {{ ansible_env.HOME }}/.nvm/nvm.sh
    nvm install {{ node_version }}
    nvm alias default {{ node_version }}
  args:
    executable: /bin/bash
  when: not (skip_node | default(false)) and (node_check.rc != 0)

- name: Configure npm global directory
  shell: |
    source {{ ansible_env.HOME }}/.nvm/nvm.sh
    mkdir -p {{ ansible_env.HOME }}/.npm-global
    npm config set prefix '{{ ansible_env.HOME }}/.npm-global'
  args:
    executable: /bin/bash
    creates: "{{ ansible_env.HOME }}/.npmrc"
  when: not (skip_node | default(false))

# Yazi file manager
- name: Check if yazi is installed
  stat:
    path: "{{ ansible_env.HOME }}/.cargo/bin/yazi"
  register: yazi_installed

- name: Install yazi
  block:
    - name: Download yazi binary
      get_url:
        url: "https://github.com/sxyazi/yazi/releases/latest/download/yazi-{{ yazi_arch_map[ansible_architecture] | default('x86_64-unknown-linux-gnu') }}.zip"
        dest: /tmp/yazi.zip
        mode: '0644'

    - name: Extract yazi
      unarchive:
        src: /tmp/yazi.zip
        dest: /tmp/
        remote_src: yes

    - name: Copy yazi binaries
      copy:
        src: "/tmp/yazi-{{ yazi_arch_map[ansible_architecture] | default('x86_64-unknown-linux-gnu') }}/{{ item }}"
        dest: "{{ ansible_env.HOME }}/.cargo/bin/{{ item }}"
        mode: '0755'
        remote_src: yes
      loop:
        - yazi
        - ya

    - name: Clean up yazi download
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/yazi.zip
        - "/tmp/yazi-{{ yazi_arch_map[ansible_architecture] | default('x86_64-unknown-linux-gnu') }}"
  when: not yazi_installed.stat.exists and (install_yazi | default(true))

# AI Tools (aider, codex, claude)
- name: Check if NVM is installed
  stat:
    path: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
  register: nvm_installed

- name: Check if aider is installed
  stat:
    path: "{{ ansible_env.HOME }}/.local/bin/aider"
  register: aider_installed

- name: Install aider
  shell: curl -LsSf https://aider.chat/install.sh | sh
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/aider"
  when: not aider_installed.stat.exists and (install_ai_tools | default(false))

- name: Install codex via npm
  shell: |
    source {{ ansible_env.HOME }}/.nvm/nvm.sh
    npm install -g @openai/codex
  args:
    executable: /bin/bash
    creates: "{{ ansible_env.HOME }}/.npm-global/bin/codex"
  when: (install_ai_tools | default(false)) and nvm_installed.stat.exists

- name: Install Claude Code via npm
  shell: |
    source {{ ansible_env.HOME }}/.nvm/nvm.sh
    npm install -g @anthropic-ai/claude-code
  args:
    executable: /bin/bash
    creates: "{{ ansible_env.HOME }}/.npm-global/bin/claude"
  when: (install_ai_tools | default(false)) and nvm_installed.stat.exists
