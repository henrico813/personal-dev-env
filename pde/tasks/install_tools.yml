---
- name: install(tool) dependencies
  apt:
    name:
      - ffmpeg
      - 7zip
      - poppler-utils
      - imagemagick
    state: present

- name: Install nvm
  become: yes
  become_user: "{{ user }}"
  shell: |
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.0/install.sh | bash
  args:
    creates: "{{ user_home }}/.nvm/nvm.sh"
  environment:
    NVM_DIR: "{{ user_home }}/.nvm"

- name: Install Node.js 20 via nvm
  become: yes
  become_user: "{{ user }}"
  shell: |
    source {{ user_home }}/.nvm/nvm.sh
    nvm install 20
    nvm alias default 20
  args:
    executable: /bin/bash
    creates: "{{ user_home }}/.nvm/versions/node/v20"

- name: Configure npm global directory
  become: yes
  become_user: "{{ user }}"
  shell: |
    source {{ user_home }}/.nvm/nvm.sh
    mkdir -p {{ user_home }}/.npm-global
    npm config set prefix '{{ user_home }}/.npm-global'
  args:
    executable: /bin/bash
    creates: "{{ user_home }}/.npmrc"

- name: check(tools) if the TGUI file manager is already installed
  stat:
    path: "{{ user_home }}/.cargo/bin/yazi"
  register: yazi_installed

- name: func_setup_yazi
  block:
    - name: func_yazi_install
      block:

      - name: Download yazi pre-built binary
        get_url:
          url: https://github.com/sxyazi/yazi/releases/latest/download/yazi-x86_64-unknown-linux-gnu.zip
          dest: /tmp/yazi.zip
          mode: '0644'

      - name: Extract yazi binary
        unarchive:
          src: /tmp/yazi.zip
          dest: /tmp/
          remote_src: yes

      - name: Install yazi binary
        become: yes
        copy:
          src: /tmp/yazi-x86_64-unknown-linux-gnu/yazi
          dest: "{{ user_home }}/.cargo/bin/yazi"
          mode: '0755'
          owner: "{{ user }}"
          group: "{{ user }}"
          remote_src: yes

      - name: Install ya (yazi CLI) binary
        become: yes
        copy:
          src: /tmp/yazi-x86_64-unknown-linux-gnu/ya
          dest: "{{ user_home }}/.cargo/bin/ya"
          mode: '0755'
          owner: "{{ user }}"
          group: "{{ user }}"
          remote_src: yes

      - name: Cleanup yazi download
        file:
          path: "{{ item }}"
          state: absent
        loop:
          - /tmp/yazi.zip
          - /tmp/yazi-x86_64-unknown-linux-gnu

      when: not yazi_installed.stat.exists

    - name: func_ueberzugpp_install
      block:

      - name: install(tools) TGUI file manager image preview dependencies
        become: yes
        apt:
          deb: https://download.opensuse.org/repositories/home:/justkidding/xUbuntu_24.04/amd64/ueberzugpp_2.9.7_amd64.deb
          state: present
        ignore_errors: yes

  when: not yazi_installed.stat.exists

- name: check(tools) if aider is already installed
  stat:
    path: "{{ user_home }}/.local/bin/aider"
  register: aider_installed

- name: func_setup_aider
  block:

    - name: install(tools) Aider 
      become: yes
      become_user: "{{ user }}"
      shell: curl -LsSf https://aider.chat/install.sh | sh
      args:
        creates: /usr/local/bin/aider

  when: not aider_installed.stat.exists

- name: check(tools) if codex is already installed
  stat:
    path: "{{ user_home }}/.npm-global/bin/codex"
  register: codex_installed

- name: func_setup_codex
  block:

    - name: install(tools) OpenAI Codex
      become: yes
      become_user: "{{ user }}"
      shell: |
        source {{ user_home }}/.nvm/nvm.sh
        npm install -g @openai/codex
      args:
        executable: /bin/bash
        creates: "{{ user_home }}/.npm-global/bin/codex"

  when: not codex_installed.stat.exists

- name: check(tools) if claude is already installed
  stat:
    path: "{{ user_home }}/.npm-global/bin/claude"
  register: claude_installed

- name: func_setup_claude
  block:

    - name: install(tools) Claude Code
      become: yes
      become_user: "{{ user }}"
      shell: |
        source {{ user_home }}/.nvm/nvm.sh
        npm install -g @anthropic-ai/claude-code
      args:
        executable: /bin/bash
        creates: "{{ user_home }}/.npm-global/bin/claude"

  when: not claude_installed.stat.exists

- name: Ensure .codex directory exists
  file:
    path: "{{ user_home }}/.codex"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: '0755'
  become: yes
  become_user: "{{ user }}"

- name: Copy config files for aider, codex
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode | default(omit) }}"
  loop: "{{ tool_cfgs }}"
  become: yes
  become_user: "{{ user }}"
