---
# Font Installation
# Downloads and installs Nerd Fonts to user fonts directory
# No sudo needed - runs as regular user

- name: Create fonts directory
  file:
    path: "{{ fonts_dir }}"
    state: directory
    mode: "0755"

- name: Download font archives
  get_url:
    url: "{{ item.url }}"
    dest: "/tmp/{{ item.name }}.{{ item.archive_type }}"
    mode: "0644"
    timeout: 120
  loop: "{{ font_downloads }}"
  loop_control:
    label: "{{ item.name }}"
  retries: 3
  delay: 5
  register: download_result
  until: download_result is succeeded

- name: Extract font archives
  unarchive:
    src: "/tmp/{{ item.name }}.{{ item.archive_type }}"
    dest: "{{ fonts_dir }}"
    remote_src: yes
  loop: "{{ font_downloads }}"
  loop_control:
    label: "{{ item.name }}"

- name: Refresh font cache
  command: fc-cache -fv
  changed_when: false

- name: Clean up downloaded archives
  file:
    path: "/tmp/{{ item.name }}.{{ item.archive_type }}"
    state: absent
  loop: "{{ font_downloads }}"
  loop_control:
    label: "{{ item.name }}"
