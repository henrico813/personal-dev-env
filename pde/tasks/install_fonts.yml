- name: Create fonts directory
  file:
    path: "/home/{{ user }}/.local/share/fonts"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
  become: yes

- name: Check if JetBrainsMono Nerd Font is already installed
  stat:
    path: "/home/{{ user }}/.local/share/fonts/JetBrainsMonoNerdFont-Regular.ttf"
  register: jetbrains_font_exists

- name: Download and install all Nerd Fonts
  block:
    - name: Download Nerd Fonts v3
      get_url:
        url: https://github.com/ryanoasis/nerd-fonts/releases/download/v3.2.1/FiraCode.zip
        dest: /tmp/FiraCode.zip

    - name: Extract Nerd Fonts v3 Font
      unarchive:
        src: /tmp/FiraCode.zip
        dest: "/home/{{ user }}/.fonts"
        owner: "{{ user }}"
        group: "{{ user }}"
        remote_src: yes

    - name: Download UbuntuMono Nerd Font
      get_url:
        url: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/UbuntuMono.zip
        dest: /tmp/UbuntuMono.tar.xz

    - name: Ensure destination directory exists
      file:
        path: "/home/{{ user }}/.fonts"
        state: directory
        owner: "{{ user }}"
        group: "{{ user }}"
        recurse: yes

    - name: Extract UbuntuMono Nerd Font
      unarchive:
        src: /tmp/UbuntuMono.tar.xz
        dest: "/home/{{ user }}/.fonts"
        owner: "{{ user }}"
        group: "{{ user }}"
        remote_src: yes

    - name: Download JetBrainsMono Nerd Font
      get_url:
        url: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.tar.xz
        dest: /tmp/JetBrainsMono.tar.xz

    - name: Extract JetBrainsMono Nerd Font
      unarchive:
        src: /tmp/JetBrainsMono.tar.xz
        dest: "/home/{{ user }}/.local/share/fonts"
        owner: "{{ user }}"
        group: "{{ user }}"
        remote_src: yes

    - name: Refresh font cache
      command: fc-cache -fv
      become: yes
      become_user: "{{ user }}"

    - name: Clean up downloaded archive
      file:
        path: /tmp/FiraCode.zip
        state: absent

    - name: Clean up downloaded archive
      file:
        path: /tmp/UbuntuMono.tar.xz
        state: absent

    - name: Clean up downloaded archive
      file:
        path: /tmp/JetBrainsMono.tar.xz
        state: absent

  when: not jetbrains_font_exists.stat.exists
  become: yes
