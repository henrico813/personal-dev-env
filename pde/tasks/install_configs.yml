---
# Copy configuration files to user home
# No sudo needed

- name: Ensure .codex directory exists
  file:
    path: "{{ ansible_env.HOME }}/.codex"
    state: directory
    mode: '0755'
  when: install_ai_tools | default(false)

- name: Ensure .config/alacritty directory exists
  file:
    path: "{{ ansible_env.HOME }}/.config/alacritty"
    state: directory
    mode: '0755'
  when: install_alacritty | default(false)

- name: Copy shell configuration files
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode | default('0644') }}"
  loop:
    - src: "config/zsh/.zsh_plugins.txt"
      dest: "{{ ansible_env.HOME }}/.zsh_plugins.txt"
    - src: "config/zsh/.zshrc"
      dest: "{{ ansible_env.HOME }}/.zshrc"
    - src: "config/tmux/.tmux.conf"
      dest: "{{ ansible_env.HOME }}/.tmux.conf"
    - src: "config/powerlevel10k/.p10k.zsh"
      dest: "{{ ansible_env.HOME }}/.p10k.zsh"
    - src: "config/screen/.screenrc"
      dest: "{{ ansible_env.HOME }}/.screenrc"

- name: Copy alacritty configuration
  copy:
    src: "config/alacritty/alacritty.toml"
    dest: "{{ ansible_env.HOME }}/.config/alacritty/alacritty.toml"
    mode: '0644'
  when: install_alacritty | default(false)

- name: Copy aider configuration
  copy:
    src: "config/aider/.aider.conf.yml"
    dest: "{{ ansible_env.HOME }}/.aider.conf.yml"
    mode: '0644'
  when: install_ai_tools | default(false)
  ignore_errors: yes  # File may not exist

- name: Copy codex configuration
  copy:
    src: "../ai-profiles/codex/config.toml"
    dest: "{{ ansible_env.HOME }}/.codex/config.toml"
    mode: '0644'
  when: install_ai_tools | default(false)
  ignore_errors: yes  # ai-profiles may not exist
