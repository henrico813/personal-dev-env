---
# Shell environment setup - user level
# No sudo needed

- name: Check if eza is installed
  stat:
    path: "{{ ansible_env.HOME }}/.cargo/bin/eza"
  register: eza_check

- name: Install eza
  block:
    - name: Try eza via cargo-binstall
      shell: "{{ ansible_env.HOME }}/.cargo/bin/cargo-binstall -y --no-confirm eza"
  rescue:
    - name: Fallback to cargo install eza
      shell: "{{ ansible_env.HOME }}/.cargo/bin/cargo install eza"
  when: not eza_check.stat.exists

- name: Check if zoxide is installed
  stat:
    path: "{{ ansible_env.HOME }}/.cargo/bin/zoxide"
  register: zoxide_check

- name: Install zoxide
  block:
    - name: Try zoxide via cargo-binstall
      shell: "{{ ansible_env.HOME }}/.cargo/bin/cargo-binstall -y --no-confirm zoxide"
  rescue:
    - name: Fallback to cargo install zoxide
      shell: "{{ ansible_env.HOME }}/.cargo/bin/cargo install zoxide"
  when: not zoxide_check.stat.exists

- name: Check if alacritty is installed
  stat:
    path: "{{ ansible_env.HOME }}/.cargo/bin/alacritty"
  register: alacritty_check

- name: Install alacritty
  block:
    - name: Try alacritty via cargo-binstall
      shell: "{{ ansible_env.HOME }}/.cargo/bin/cargo-binstall -y --no-confirm alacritty"
  rescue:
    - name: Fallback to cargo install alacritty
      shell: "{{ ansible_env.HOME }}/.cargo/bin/cargo install alacritty"
  when: not alacritty_check.stat.exists and (install_alacritty | default(false))

- name: Check if antidote is installed
  stat:
    path: "{{ app_data_dir }}/antidote"
  register: antidote_check

- name: Install antidote (zsh plugin manager)
  git:
    repo: https://github.com/mattmc3/antidote.git
    dest: "{{ app_data_dir }}/antidote"
    depth: 1
  when: not antidote_check.stat.exists

- name: Install powerlevel10k theme
  git:
    repo: https://github.com/romkatv/powerlevel10k.git
    dest: "{{ app_data_dir }}/powerlevel10k"
    update: yes

- name: Install tmux plugin manager
  git:
    repo: https://github.com/tmux-plugins/tpm
    dest: "{{ ansible_env.HOME }}/.tmux/plugins/tpm"
    update: yes

- name: Check if LazyVim is installed
  stat:
    path: "{{ app_data_dir }}/nvim"
  register: lazyvim_check

- name: Install LazyVim starter
  git:
    repo: https://github.com/LazyVim/starter
    dest: "{{ app_data_dir }}/nvim"
  when: not lazyvim_check.stat.exists and (install_lazyvim | default(true))

- name: Clean LazyVim git directory
  file:
    path: "{{ app_data_dir }}/nvim/.git"
    state: absent
  when: install_lazyvim | default(true)
