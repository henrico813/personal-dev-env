---
# System-level configuration - requires sudo
# Run with: ansible-playbook system.yml --ask-become-pass
- name: System-level setup
  hosts: all
  become: yes

  vars_files:
    - defaults.yml
    - vars/versions.yml

  vars:
    target_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: [system, apt]

    - name: Install system packages
      apt:
        name:
          - curl
          - tar
          - xz-utils
          - sudo
          - screen
          - locales
          - locales-all
          - fontconfig
          - fonts-dejavu-core
          - fonts-dejavu-extra
          - fonts-liberation
          - fonts-powerline
          - unzip
          - git
          - python3
          - zsh
        state: present
      tags: [system, apt]

    - name: Install tmux build dependencies
      apt:
        name:
          - build-essential
          - libevent-dev
          - libncurses-dev
          - bison
        state: present
      tags: [system, apt, tmux]

    - name: Check installed tmux version
      shell: tmux -V 2>/dev/null | grep -oP '\d+\.\d+[a-z]?' || echo "0"
      register: installed_tmux
      changed_when: false
      tags: [system, tmux]

    - name: Install tmux from source
      block:
        - name: Download tmux source
          get_url:
            url: "https://github.com/tmux/tmux/releases/download/{{ tmux_version }}/tmux-{{ tmux_version }}.tar.gz"
            dest: "/tmp/tmux-{{ tmux_version }}.tar.gz"
            mode: '0644'

        - name: Extract tmux source
          unarchive:
            src: "/tmp/tmux-{{ tmux_version }}.tar.gz"
            dest: /tmp
            remote_src: yes

        - name: Compile and install tmux
          shell: |
            cd /tmp/tmux-{{ tmux_version }}
            ./configure --prefix=/usr/local
            make -j$(nproc)
            make install
          args:
            creates: /usr/local/bin/tmux

        - name: Clean up tmux source
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - "/tmp/tmux-{{ tmux_version }}.tar.gz"
            - "/tmp/tmux-{{ tmux_version }}"
      when: installed_tmux.stdout != tmux_version
      tags: [system, tmux]

    - name: Install shell tools via apt
      apt:
        name: "{{ shell_tools | default(['fd-find', 'fzf', 'ripgrep', 'bat', 'trash-cli', 'jq']) }}"
        state: present
      tags: [system, apt, shell]

    - name: Install dev tool dependencies
      apt:
        name: "{{ dev_tools | default(['ffmpeg', '7zip', 'poppler-utils', 'imagemagick']) }}"
        state: present
      when: install_dev_tools | default(false)
      tags: [system, apt, tools]

    - name: Install alacritty build dependencies
      apt:
        name:
          - cmake
          - pkg-config
          - libfreetype6-dev
          - libfontconfig1-dev
          - libxcb-xfixes0-dev
          - libxkbcommon-dev
        state: present
      when: install_alacritty | default(false)
      tags: [system, apt, alacritty]

    - name: Configure system locale
      locale_gen:
        name: "{{ locale | default('en_US.UTF-8') }}"
        state: present
      tags: [system, locale]

    - name: Set system timezone
      timezone:
        name: "{{ timezone | default('America/Los_Angeles') }}"
      tags: [system, timezone]

    - name: Install neovim to /opt
      get_url:
        url: "https://github.com/neovim/neovim/releases/{{ neovim_version }}/download/nvim-linux-x86_64.appimage"
        dest: /opt/nvim
        mode: '0755'
        timeout: 120
      register: nvim_download
      retries: 3
      delay: 5
      until: nvim_download is succeeded
      when: install_neovim | default(true)
      tags: [system, neovim]

    - name: Create neovim symlink
      file:
        src: /opt/nvim
        dest: /usr/local/bin/vim
        state: link
        force: yes
      when: install_neovim | default(true)
      tags: [system, neovim]

    - name: Set user shell to zsh
      user:
        name: "{{ target_user }}"
        shell: /bin/zsh
      tags: [system, shell]

    - name: Grant sudo privileges (guarded - not recommended)
      lineinfile:
        path: "/etc/sudoers"
        state: present
        line: "{{ target_user }} ALL=(ALL) NOPASSWD:ALL"
        validate: "/usr/sbin/visudo -cf %s"
      when: grant_passwordless_sudo | default(false)
      tags: [system, sudo]
